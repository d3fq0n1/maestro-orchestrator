version: "3.9"
services:
  maestro:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Enable interactive TTY so the startup dialog is displayed.
    # Set MAESTRO_MODE=web in .env to skip the dialog and auto-launch the Web-UI.
    stdin_open: true
    tty: true
    volumes:
      - maestro-sessions:/app/data/sessions
      - maestro-r2:/app/data/r2
      - maestro-env:/app/backend/env

volumes:
  maestro-sessions:
  maestro-r2:
  maestro-env:
