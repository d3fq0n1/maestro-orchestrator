version: "3.9"
services:
  maestro:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MAESTRO_MODE=${MAESTRO_MODE:-web}
      # Set to your repo URL to enable in-app updates (e.g. https://github.com/user/maestro-orchestrator.git)
      - MAESTRO_UPDATE_REMOTE=${MAESTRO_UPDATE_REMOTE:-}
    # .env is optional — API keys can be configured via the Web-UI at runtime
    # and are persisted in the maestro-env volume across restarts.
    # Create an empty .env if you don't need host-level env vars.
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - maestro-sessions:/app/data/sessions
      - maestro-r2:/app/data/r2
      - maestro-env:/app/backend/env

volumes:
  maestro-sessions:
  maestro-r2:
  maestro-env:
